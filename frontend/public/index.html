<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="BeautyBook - Hệ thống đặt lịch dịch vụ làm đẹp thông minh, tích hợp AI" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BeautyBook" />
  <link rel="icon" href="/icons/logo_1.jpg" />
  <link rel="manifest" href="/manifest.json" />
  <title>BeautyBook</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background-color: #f5f5f5;
    }
  </style>
</head>

<body>
  <noscript>Bật JavaScript để chạy ứng dụng.</noscript>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
          .then(function (reg) { console.log('[SW] Registered:', reg.scope); })
          .catch(function (err) { console.log('[SW] Registration failed:', err); });
      });
    }
  </script>
</body>

</html>
